<!DOCTYPE html>
<html>
<head>
    <title>Disease Predictor</title>

    <!-- IMPORTANT FOR MOBILE -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background:  #1a2760;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
        }

        .card {
            background: rgb(224, 223, 223);
            padding: 25px;
            width: 100%;
            max-width: 420px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            text-align: center;
            animation: fadeIn 0.5s ease-in-out;
        }

        h1 {
            margin-bottom: 20px;
            color: #5c8ab9;
            font-size: 22px;
        }

        select {
            padding: 12px;
            width: 60%;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-size: 14px;
        }

        button {
            padding: 12px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
            font-size: 14px;
        }

        .add-btn {
            background-color: #3498db;
            color: white;
            width: 100%;
            margin-top: 10px;
        }

        .predict-btn {
            background-color: #b91919;
            color: white;
            width: 100%;
            margin-top: 15px;
            font-size: 16px;
        }

        .remove-btn {
            background-color: #b6685f;
            color: white;
            margin-left: 8px;
        }

        button:hover {
            transform: scale(1.03);
            opacity: 0.9;
        }

        .symptom-row {
            margin-bottom: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #result {
            margin-top: 20px;
            font-size: 16px;
            font-weight: bold;
            color: #2c3e50;
        }

        #loading {
            display: none;
            margin-top: 10px;
            font-size: 14px;
        }

        /* 📱 MOBILE SPECIFIC */
        @media (max-width: 480px) {

            h1 {
                font-size: 18px;
            }

            select {
                width: 65%;
                font-size: 13px;
            }

            button {
                font-size: 13px;
                padding: 10px;
            }

            .card {
                padding: 20px;
                border-radius: 12px;
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>

<body>

<div class="card">
    <h1>Disease Predictor</h1>

    <div id="symptom-container"></div>

    <button class="add-btn" onclick="addSymptom()">+ Add Symptom</button>

    <button class="predict-btn" onclick="predictDisease()">Predict</button>

    <div id="loading"> Predicting...</div>

    <div id="result"></div>
</div>

<script>
    let symptomsData = [];

    async function loadSymptoms() {
        let res = await fetch("/symptoms");
        symptomsData = await res.json();
        addSymptom();
    }

    function createDropdown() {
        let select = document.createElement("select");

        symptomsData.forEach(symptom => {
            let option = document.createElement("option");
            option.value = symptom;
            option.text = symptom.replace(/_/g, " ");
            select.appendChild(option);
        });

        return select;
    }

    function addSymptom() {
        let container = document.getElementById("symptom-container");

        let div = document.createElement("div");
        div.className = "symptom-row";

        let dropdown = createDropdown();

        let removeBtn = document.createElement("button");
        removeBtn.innerText = "✖";
        removeBtn.className = "remove-btn";

        removeBtn.onclick = () => container.removeChild(div);

        div.appendChild(dropdown);
        div.appendChild(removeBtn);

        container.appendChild(div);
    }

    async function predictDisease() {
        let selects = document.querySelectorAll("select");
        let selectedSymptoms = [];

        selects.forEach(s => selectedSymptoms.push(s.value));

        document.getElementById("loading").style.display = "block";
        document.getElementById("result").innerText = "";

        let res = await fetch("/predict", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({ symptoms: selectedSymptoms })
        });

        let data = await res.json();

        document.getElementById("loading").style.display = "none";
        document.getElementById("result").innerText =
            "🧾 Prediction: " + data.disease;
    }

    loadSymptoms();
</script>

</body>
</html>
