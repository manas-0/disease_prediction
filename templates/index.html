<!DOCTYPE html>
<html>
<head>
    <title>Disease Prediction System</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            margin-top: 40px;
        }
        select, button {
            padding: 10px;
            margin: 5px;
        }
        #symptom-container {
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

    <h1>Disease Prediction System</h1>

    <div id="symptom-container"></div>

    <button onclick="addSymptom()">+ Add Symptom</button>
    <br><br>

    <button onclick="predictDisease()">Predict</button>

    <h2 id="result"></h2>

<script>
    let symptomsData = [];

    // Load symptoms from backend
    async function loadSymptoms() {
        let res = await fetch("http://127.0.0.1:5000/symptoms");
        symptomsData = await res.json();

        addSymptom(); // add first dropdown
    }

    function createDropdown() {
        let select = document.createElement("select");

        symptomsData.forEach(symptom => {
            let option = document.createElement("option");
            option.value = symptom;
            option.text = symptom;
            select.appendChild(option);
        });

        return select;
    }

    function addSymptom() {
        let container = document.getElementById("symptom-container");
        container.appendChild(createDropdown());
        container.appendChild(document.createElement("br"));
    }

    async function predictDisease() {
        let selects = document.querySelectorAll("select");
        let selectedSymptoms = [];

        selects.forEach(s => {
            selectedSymptoms.push(s.value);
        });

        let res = await fetch("/predict", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ symptoms: selectedSymptoms })
        });

        let data = await res.json();

        document.getElementById("result").innerText =
            "Predicted Disease: " + data.disease;
    }

    loadSymptoms();
</script>

</body>
</html>
